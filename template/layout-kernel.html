<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$if(title)$$title$ | $endif$BjörnBlog</title>
  $if(date)$<meta name="date" content="$date$">$endif$
  <link rel="stylesheet" href="css/kernel.min.css">
</head>
<body class="ke-modern">
  <header class="ke-header ke-header-sm">
    <div class="ke-container">
      <input class="ke-nav-toggle" id="ke-nav-toggle" type="checkbox">
      <label for="ke-nav-toggle" class="ke-nav-toggle-hamburger"><span>&#9776;</span></label>
      <nav class="ke-nav">
        <ul>
          <li><a href="index-kernel.html"><strong>BjörnBlog</strong></a></li>
          <li><a href="index-kernel.html">Posts</a></li>
          $if(theme-switch-url)$
          <li><a href="$theme-switch-url$">Switch theme</a></li>
          $endif$
        </ul>
      </nav>
    </div>
  </header>

  <main class="ke-container ke-content">
    $if(title)$<h1>$title$</h1>$endif$
    $if(date)$<p><time datetime="$date$">$date$</time></p>$endif$
$body$
$include-after$
  </main>

  <footer>
    <div class="ke-bg-default ke-content">
      <div class="ke-container">
        <p>Björn &mdash; <a href="https://github.com/bjuergens">GitHub</a> · <a href="https://stackoverflow.com/users/5132456/wotanii">StackOverflow</a></p>
        <p>Built with <a href="https://pandoc.org">Pandoc</a>, <a href="https://github.com/ellegantcss/ellegant">Ellegant CSS</a>, <a href="https://github.com/christian-dale/kernel.css">Kernel CSS</a>, and <a href="https://claude.ai">Claude</a></p>
      </div>
    </div>
  </footer>
</body>
</html>
