<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$if(title)$$title$ | $endif$BjörnBlog</title>
  $if(date)$<meta name="date" content="$date$">$endif$
  <link rel="stylesheet" href="css/ellegant.min.css">
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Helvetica Neue, Arial, sans-serif;
      color: #2a2a2a;
      margin: 0;
      line-height: 1.6;
    }
    nav {
      background: #fafafa;
      border-bottom: 1px solid #e8e8e8;
      padding: 10px 20px;
    }
    nav a {
      color: #2a2a2a;
      text-decoration: none;
      margin-right: 15px;
    }
    nav a:hover { color: #018fe8; }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }
    h1, h2, h3, h4, h5, h6 { font-weight: 400; }
    a { color: #018fe8; }
    footer {
      border-top: 1px solid #e8e8e8;
      padding: 10px 20px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html"><strong>BjörnBlog</strong></a>
      <a href="index.html">Posts</a>
      $if(theme-switch-url)$
      <a href="$theme-switch-url$">Switch theme</a>
      $endif$
    </nav>
  </header>

  <main>
    $if(title)$<h1>$title$</h1>$endif$
    $if(date)$<p><time datetime="$date$">$date$</time></p>$endif$
$body$
$include-after$
  </main>

  <footer>
    <p>Björn &mdash; <a href="https://github.com/bjuergens">GitHub</a> · <a href="https://stackoverflow.com/users/5132456/wotanii">StackOverflow</a></p>
    <p>Built with <a href="https://pandoc.org">Pandoc</a>, <a href="https://github.com/ellegantcss/ellegant">Ellegant CSS</a>, <a href="https://github.com/christian-dale/kernel.css">Kernel CSS</a>, and <a href="https://claude.ai">Claude</a></p>
  </footer>
</body>
</html>
