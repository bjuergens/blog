name: PR Check

on:
  pull_request:

permissions:
  contents: write

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: pandoc/actions/setup@v1

      - name: Build site
        run: bash build.sh

      - name: Verify output files
        run: |
          test -f public/index.html
          test -f public/index-kernel.html
          test -f public/css/ellegant.min.css
          test -f public/css/kernel.min.css
          for f in content/[0-9][0-9][0-9][0-9]-*.md; do
            slug=$(basename "$f" .md)
            test -f "public/${slug}.html"
            test -f "public/${slug}-kernel.html"
          done

      - name: Validate HTML structure
        run: |
          grep -q '<main>' public/index.html
          grep -q 'Posts' public/index.html
          grep -q 'css/ellegant.min.css' public/index.html
          grep -q 'css/kernel.min.css' public/index-kernel.html

      - name: Take screenshots
        run: |
          mkdir -p screenshots
          for f in public/*.html; do
            name=$(basename "$f" .html)
            google-chrome --headless=new --no-sandbox --disable-gpu \
              --screenshot="screenshots/${name}.png" --window-size=1280,900 \
              "file://$(pwd)/$f"
          done

      - name: Push screenshots and write summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f screenshots/
          git commit -m "Update screenshots [skip ci]"
          git push

          echo "## Page Screenshots" >> "$GITHUB_STEP_SUMMARY"
          for f in screenshots/*.png; do
            name=$(basename "$f" .png)
            url="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref }}/screenshots/${name}.png"
            echo "### ${name}" >> "$GITHUB_STEP_SUMMARY"
            echo "![${name}](${url})" >> "$GITHUB_STEP_SUMMARY"
          done
