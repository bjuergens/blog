name: PR Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pandoc/actions/setup@v1

      - name: Build site
        run: bash build.sh

      - name: Verify output files
        run: |
          test -f public/index.html
          test -f public/index-kernel.html
          test -f public/css/ellegant.min.css
          test -f public/css/kernel.min.css
          for f in content/[0-9][0-9][0-9][0-9]-*.md; do
            slug=$(basename "$f" .md)
            test -f "public/${slug}.html"
            test -f "public/${slug}-kernel.html"
          done

      - name: Validate HTML structure
        run: |
          grep -q '<main>' public/index.html
          grep -q 'Posts' public/index.html
          grep -q 'css/ellegant.min.css' public/index.html
          grep -q 'css/kernel.min.css' public/index-kernel.html

      - name: Take screenshots
        run: |
          mkdir -p screenshots
          for f in public/*.html; do
            name=$(basename "$f" .html)
            google-chrome --headless=new --no-sandbox --disable-gpu \
              --screenshot="screenshots/${name}.png" --window-size=1280,900 \
              "file://$(pwd)/$f"
          done

      - name: Write summary
        run: |
          echo "## Page Screenshots" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the **page-screenshots** artifact below to view rendered pages." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Page | Theme |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          for f in screenshots/*.png; do
            name=$(basename "$f" .png)
            echo "| ${name} | $(echo "$name" | grep -q kernel && echo kernel || echo ellegant) |" >> "$GITHUB_STEP_SUMMARY"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: page-screenshots
          path: screenshots/
          retention-days: 3
